<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Conectando...</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: sans-serif;
      color: #fff;
      text-align: center;
    }
    p { opacity: 0.7; font-size: 14px; }
  </style>
</head>
<body>
  <div>
    <p>Conectando ao Google Classroom...</p>
    <p>Esta janela fechará automaticamente.</p>
  </div>
  <script>
    // Fluxo Authorization Code + PKCE:
    // O Google redireciona para esta página com ?code=...&state=...
    // Enviamos o code para a janela pai (o app) via postMessage,
    // que vai trocá-lo por um access_token no endpoint oauth2.googleapis.com/token.
    const params = new URLSearchParams(location.search);
    const code   = params.get('code');
    const state  = params.get('state');
    const error  = params.get('error');

    window.opener?.postMessage(
      { type: 'classroom-code', code, state, error },
      location.origin
    );

    setTimeout(() => window.close(), 1000);
  </script>
</body>
</html>
